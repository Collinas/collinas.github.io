      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');

    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {

        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);

px)}80%{transform:translate(4px,3px)}}\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;font-family:'Fredoka',sans-serif;background:linear-gradient(180deg,#5E2A33 0%,#7C3D46 55%,#96535F 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:24px 12px;color:#5C3338;\">\n  <div style=\"position:absolute;bottom:-130px;left:-90px;width:430px;height:310px;background:rgba(156,123,194,.3);border-radius:50%;\"><\u002Fdiv>\n  <div style=\"position:absolute;bottom:-160px;right:-70px;width:540px;height:350px;background:rgba(120,70,140,.28);border-radius:50%;\"><\u002Fdiv>\n  <div style=\"position:absolute;bottom:16px;left:26px;font-size:32px;opacity:.9;\">🌷<\u002Fdiv>\n  <div style=\"position:absolute;bottom:26px;right:34px;font-size:36px;opacity:.9;\">🏡<\u002Fdiv>\n\n  <sc-if value=\"{{ isTitle }}\" hint-placeholder-val=\"{{ true }}\">\n    <div data-screen-label=\"Tela inicial\" style=\"position:relative;background:rgba(255,255,255,.93);border-radius:32px;padding:36px 30px;max-width:440px;width:100%;text-align:center;box-shadow:0 18px 50px rgba(30,8,14,.4);display:flex;flex-direction:column;align-items:center;gap:14px;animation:popIn .4s ease;\">\n      <div>{{ titleArt }}<\u002Fdiv>\n      <div style=\"font-size:40px;font-weight:700;line-height:1.1;color:#8C4750;text-wrap:pretty;\">Fazendinha da Aninha<\u002Fdiv>\n      <div style=\"background:#F7DCE5;color:#8C4750;font-weight:600;padding:8px 20px;border-radius:999px;font-size:18px;\">🎀 25 aninhos 🎀<\u002Fdiv>\n      <p style=\"font-size:17px;line-height:1.5;color:#8F6A70;text-wrap:pretty;\">Combine 3 itens iguais e colha <b>25 de cada meta<\u002Fb> — uma colheita para cada ano da Ana Paula! 🌱 Junte 4 ou mais para criar itens especiais ✨<\u002Fp>\n      <button onclick=\"{{ startGame }}\" style=\"background:#8C4750;color:#FFFFFF;border:none;border-radius:999px;padding:14px 38px;font-size:20px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:0 8px 20px rgba(40,12,18,.4);transition:transform .15s ease;\" style-hover=\"transform:scale(1.06);\">Começar 🌻<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isGame }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Jogo\" style=\"position:relative;display:flex;flex-direction:column;gap:12px;align-items:center;animation:popIn .35s ease;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;width:100%;max-width:{{ boardW }}px;gap:10px;\">\n        <div style=\"background:#F7DCE5;color:#8C4750;font-weight:600;padding:7px 16px;border-radius:999px;font-size:15px;box-shadow:0 3px 10px rgba(40,12,18,.25);\">Fase {{ levelNum }} de 5<\u002Fdiv>\n        <div style=\"background:#E9DCF6;color:#7B5AA6;font-weight:600;padding:7px 16px;border-radius:999px;font-size:15px;box-shadow:0 3px 10px rgba(40,12,18,.25);\">🌟 {{ movesLeft }} jogadas<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,.93);border-radius:18px;padding:10px 16px;display:flex;align-items:center;gap:12px;width:100%;max-width:{{ boardW }}px;box-shadow:0 6px 18px rgba(30,8,14,.3);\">\n        <div style=\"font-size:26px;line-height:1;\">{{ target }}<\u002Fdiv>\n        <div style=\"flex:1;height:14px;background:#F7DCE5;border-radius:999px;overflow:hidden;\">\n          <div style=\"height:100%;width:{{ progressPct }}%;background:linear-gradient(90deg,#C75B7A,#9C7BC2);border-radius:999px;transition:width .3s ease;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-weight:700;color:#8C4750;font-size:17px;min-width:56px;text-align:right;\">{{ collected }}/25<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ hasChat }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;align-items:flex-start;gap:8px;width:100%;max-width:{{ boardW }}px;min-height:48px;\">\n          <div style=\"width:34px;height:34px;border-radius:999px;background:{{ chatAvBg }};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#FFFFFF;flex-shrink:0;box-shadow:0 3px 8px rgba(40,12,18,.3);\">{{ chatAv }}<\u002Fdiv>\n          <div style=\"background:rgba(255,255,255,.93);border-radius:4px 16px 16px 16px;padding:6px 12px 7px;box-shadow:0 3px 10px rgba(40,12,18,.2);\">\n            <div style=\"font-size:11px;font-weight:700;color:#9C7BC2;line-height:1.2;\">{{ chatName }}<\u002Fdiv>\n            <div style=\"font-size:14px;color:#5C3338;line-height:1.35;text-wrap:pretty;\">{{ chatText }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      {{ board }}\n      <div style=\"font-size:14px;color:#F0D5DB;text-align:center;text-wrap:pretty;\">Arraste ou toque em dois vizinhos · Junte 4+ para itens especiais ✨<\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ showIntro }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;inset:0;background:rgba(50,20,28,.5);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:20px;z-index:20;\">\n        <div style=\"background:#FFFFFF;border-radius:28px;padding:28px 26px;max-width:410px;width:100%;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px;box-shadow:0 20px 50px rgba(80,40,55,.3);animation:popIn .35s ease;\">\n          <div style=\"font-size:52px;line-height:1;\">{{ target }}<\u002Fdiv>\n          <div style=\"font-size:24px;font-weight:700;color:#8C4750;line-height:1.2;text-wrap:pretty;\">Fase {{ levelNum }}: {{ introTitle }}<\u002Fdiv>\n          <p style=\"font-size:15px;line-height:1.5;color:#8F6A70;text-wrap:pretty;\">{{ introText }}<\u002Fp>\n          <div style=\"background:#EDE2F8;color:#7B5AA6;font-weight:600;padding:7px 16px;border-radius:999px;font-size:15px;\">Meta: 25 {{ target }} em {{ levelMoves }} jogadas<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:5px;width:100%;background:#FFF8F0;border-radius:16px;padding:12px 14px;text-align:left;\">\n            <div style=\"font-size:12px;font-weight:700;color:#C98A2D;letter-spacing:.6px;\">ITENS ESPECIAIS<\u002Fdiv>\n            <div style=\"font-size:14px;color:#8F6A70;\">🚜 4 na linha — o trator limpa a linha toda<\u002Fdiv>\n            <div style=\"font-size:14px;color:#8F6A70;\">🚀 4 na coluna — o foguete limpa a coluna<\u002Fdiv>\n            <div style=\"font-size:14px;color:#8F6A70;\">🧨 em L ou T — explode tudo ao redor<\u002Fdiv>\n            <div style=\"font-size:14px;color:#8F6A70;\">🌈 5 iguais — troque e colha todos de um tipo<\u002Fdiv>\n            <div style=\"font-size:13px;color:#B08A91;\">Dica: toque 2x em um item especial para ativá-lo!<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ closeIntro }}\" style=\"background:#8C4750;color:#FFFFFF;border:none;border-radius:999px;padding:12px 34px;font-size:18px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:0 8px 20px rgba(40,12,18,.4);transition:transform .15s ease;\" style-hover=\"transform:scale(1.06);\">Vamos! 🌱<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ showWin }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;inset:0;background:rgba(50,20,28,.5);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:20px;z-index:20;\">\n        <div style=\"background:#FFFFFF;border-radius:28px;padding:32px 28px;max-width:400px;width:100%;text-align:center;display:flex;flex-direction:column;align-items:center;gap:13px;box-shadow:0 20px 50px rgba(80,40,55,.3);animation:popIn .35s ease;\">\n          <div style=\"font-size:56px;line-height:1;\">🎉<\u002Fdiv>\n          <div style=\"font-size:26px;font-weight:700;color:#8C4750;\">Fase {{ levelNum }} completa!<\u002Fdiv>\n          <p style=\"font-size:17px;line-height:1.5;color:#8F6A70;text-wrap:pretty;\">{{ winText }}<\u002Fp>\n          <button onclick=\"{{ nextLevel }}\" style=\"background:#8C4750;color:#F <div style=\"display:flex;gap:10px;flex-wrap:wrap;justify-content:center;\">\n            <button onclick=\"{{ interReplay }}\" style=\"background:#FFFFFF;color:#8C4750;border:2px solid #E8CDD6;border-radius:999px;padding:11px 22px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;transition:transform .15s ease;\" style-hover=\"transform:scale(1.06);\">Jogar de novo 🔁<\u002Fbutton>\n            <button onclick=\"{{ interContinue }}\" style=\"background:#8C4750;color:#FFFFFF;border:none;border-radius:999px;padding:11px 26px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:0 8px 20px rgba(40,12,18,.4);transition:transform .15s ease;\" style-hover=\"transform:scale(1.06);\">Fase {{ interNextNum }} ➜<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isFinal }}\" hint-placeholder-val=\"{{ false }}\">\n    {{ confetti }}\n    <div data-screen-label=\"Final\" style=\"position:relative;background:rgba(255,255,255,.95);border-radius:32px;padding:38px 32px;max-width:480px;width:100%;text-align:center;box-shadow:0 18px 50px rgba(30,8,14,.4);display:flex;flex-direction:column;align-items:center;gap:15px;animation:popIn .45s ease;z-index:5;\">\n      <div style=\"font-size:62px;line-height:1;\">🎂<\u002Fdiv>\n      <div style=\"font-size:38px;font-weight:700;color:#8C4750;line-height:1.1;text-wrap:pretty;\">Parabéns, Aninha!<\u002Fdiv>\n      <div style=\"background:#F7DCE5;color:#8C4750;font-weight:600;padding:8px 20px;border-radius:999px;font-size:17px;\">🎉 25 anos colhidos com amor 🎉<\u002Fdiv>\n      <div style=\"background:#F7E8EC;border-radius:20px;padding:22px 20px;font-size:18px;line-height:1.6;color:#6B4148;font-style:italic;text-wrap:pretty;\">“Você é minha melhor companhia, eu sempre cuidarei de você, minha eterna Aninha desde os 13 anos.”<br><b style=\"font-style:normal;color:#8C4750;\">— do seu Ni 💍<\u002Fb><\u002Fdiv>\n      <div style=\"font-size:15px;color:#A98B8B;\">🐶 “Au au au!” — o Timão também mandou parabéns<\u002Fdiv>\n      <button onclick=\"{{ playAgain }}\" style=\"background:#8C4750;color:#FFFFFF;border:none;border-radius:999px;padding:13px 36px;font-size:19px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:0 8px 20px rgba(40,12,18,.4);transition:transform .15s ease;\" style-hover=\"transform:scale(1.06);\">Jogar de novo 💛<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'title',\n    levelIndex: 0,\n    tiles: [],\n    collected: 0,\n    moves: 25,\n    selectedId: null,\n    busy: false,\n    showIntro: false,\n    overlay: null,\n    toast: null,\n    hint: null,\n    shaking: false,\n    inter: null,\n    chat: null,\n  };\n\n  nextId = 1;\n  down = null;\n  lastAction = Date.now();\n\n  calcCell() {\n    const ideal = this.COLS >= 9 ? 46 : 52;\n    const avail = Math.floor((window.innerWidth - 36) / this.COLS);\n    return Math.max(32, Math.min(ideal, avail));\n  }\n\n  componentDidMount() {\n    this._onResize = () => {\n      if (this.shape) {\n        const c = this.calcCell();\n        if (c !== this.CELL) { this.CELL = c; this.forceUpdate(); }\n      }\n    };\n    window.addEventListener('resize', this._onResize);\n    this.idleTimer = setInterval(() => this.checkIdle(), 700);\n    this.interTick = setInterval(() => {\n      const s = this.state;\n      if (s.screen !== 'interlude' || !s.inter || s.inter.intro || s.inter.done) return;\n      const iv = s.inter;\n      const now = Date.now();\n      if (iv.endAt && now >= iv.endAt) { this.finishInterlude(); return; }\n      if (iv.type === 'zoo') this.zooTick(now);\n      else if (iv.type === 'plane') this.planeTick(now);\n      else this.forceUpdate();\n    }, 160);\n    this.chatTimer = setInterval(() => {\n      const s = this.state;\n      if (s.screen === 'game' && !s.showIntro && !s.overlay && Date.now() - this.chatAt > 9000) this.say('base');\n    }, 3000);\n  }\n\n  componentWillUnmount() { clearInterval(this.idleTimer); clearInterval(this.interTick); clearInterval(this.chatTimer); window.removeEventListener('resize', this._onResize); }\n\n  bump() {\n    this.lastAction = Date.now();\n    if (this.state.hint) this.setState({ hint: null });\n  }\n\n  checkIdle() {\n    const s = this.state;\n    if (s.screen !== 'game' || s.busy || s.showIntro || s.overlay || s.hint) return;\n    if (Date.now() - this.lastAction < 5000) return;\n    const mv = this.findBestMove();\n    if (mv) this.setState({ hint: mv }); else this.lastAction = Date.now();\n  }\n\n  findBestMove() {\n    const live = this.state.tiles.filter((t) => !t.rm);\n    const L = this.levels[this.state.levelIndex];\n    const at = {};\n    live.forEach((t) => { at[t.r + ',' + t.c] = t; });\n    let best = null, bestScore = 0;\n    const consider = (ids, score) => { if (score > bestScore) { bestScore = score; best = ids; } };\n    live.forEach((t) => {\n      if (t.special) consider([t.id], t.special === 'rainbow' ? 18 : t.special === 'bomb' ? 11 : 9);\n    });\n    for (const t of live) {\n      for (const d of [[0, 1], [1, 0]]) {\n        const n = at[(t.r + d[0]) + ',' + (t.c + d[1])];\n        if (!n) continue;\n        if (t.special && n.special) { consider([t.id, n.id], 30); continue; }\n        if (t.special || n.special) {\n          const sp = t.special ? t : n;\n          consider([t.id, n.id], sp.special === 'rainbow' ? 26 : 13);\n          continue;\n        }\n        const clone = live.map((x) => (x === t ? { ...x, r: n.r, c: n.c } : x === n ? { ...x, r: t.r, c: t.c } : x));\n        const runs = this.findRuns(clone);\n        if (!runs.length) continue;\n        let sc = 0;\n        const seen = new Set();\n        runs.forEach((run) => {\n          sc += run.tiles.length;\n          if (run.tiles.length >= 5) sc += 12; else if (run.tiles.length === 4) sc += 6;\n          run.tiles.forEach((x) => { if (!seen.has(x.id)) { seen.add(x.id); if (x.type === L.target) sc += 3; } });\n        });\n        if (runs.length >= 2) sc += 5;\n        consider([t.id, n.id], sc);\n      }\n    }\n    return best ? { ids: best } : null;\n  }\n\n  shape = null;\n  ROWS = 8;\n  COLS = 8;\n  CELL = 52;\n\n  // pastel backgrounds per symbol position in the level set (target = index 0 = pink)\n  PALETTE = ['#F8CFDF', '#E4D3F4', '#FBE9C6', '#D6E9F8', '#FCF3C4', '#DCEFDC'];\n\n  SPECIAL_ICON = { rocketH: '🚜', rocketV: '🚀', bomb: '🧨', rainbow: '🌈' };\n\n  levels = [\n    {\n      target: '🍫', set: ['🍫', '🍭', '🧁', '🍬'], moves: 22, weight: 1.4,\n      title: 'Colheita de Brigadeiros', text: 'Colha 25 brigadeirinhos — o doce favorito da aniversariante! 🍫', win: 'Que doçura! A fazenda inteira ficou com cheiro de brigadeiro. 🍫',\n      shape: [\n        '########',\n        '########',\n        '########',\n        '########',\n        '########',\n        '########',\n        '########',\n        '########',\n      ],\n    },\n    {\n      target: '📖', set: ['📖', '🍎', '🐰', '🌷', '🐥'], moves: 21, weight: 1.3,\n      title: 'Hora da Leitura', text: 'Junte 25 livros para a estante da maior leitora que eu conheço (tem a tetralogia napolitana no meio 👀)', win: 'Estante completa! Lenu e Lila aplaudiram lá de Nápoles. 📚',\n      shape: [\n        '..####..',\n        '.######.',\n        '########',\n        '########',\n        '########',\n        '########',\n        '.######.',\n        '..####..',\n      ],\n    },\n    {\n      target: '⚖️', set: ['⚖️', '🐮', '🍇', '🌼', '🌽'], moves: 20, weight: 1.22,\n      title: 'Dra. Ana Paula', text: 'Reúna 25 balanças da justiça, Excelentíssima! ⚖️', win: 'Causa ganha, Doutora! Nada mais a declarar. 🏛️',\n      shape: [\n        '...###...',\n        '...###...',\n        '...###...',\n        '#########',\n        '#########',\n        '#########',\n        '...###...',\n        '...###...',\n        '...###...',\n      ],\n    },\n    {\n      target: '🦴', set: ['🦴', '🐶', '🥕', '🍎', '🌻', '🐥'], moves: 19, weight: 1.15,\n      title: 'Petiscos do Timão', text: 'O Timão está pedindo 25 ossinhos! Au au! 🐶', win: 'O Timão está abanando o rabo de tanta alegria! 🐶💛',\n      shape: [\n        '.##..##.',\n        '########',\n        '########',\n        '########',\n        '########',\n        '.######.',\n        '..####..',\n        '...##...',\n      ],\n    },\n    {\n      target: '🎂', set: ['🎂', '🎁', '🎈', '🍓', '🍇'], moves: 20, weight: 1.18,\n      title: 'A Festa dos 25', text: 'Junte 25 bolos para a grande festa! A Mariana já confirmou presença 🎈', win: 'Tudo pronto para a festa!',\n      shape: [\n        '....#....',\n        '...###...',\n        '..#####..',\n        '.#######.',\n        '#########',\n        '.#######.',\n        '..#####..',\n        '...###...',\n        '....#....',\n      ],\n    },\n  ];\n\n  // ===== Intervalos estilo fazendinha (entre as fases) =====\n\n  CROPS = { '🥕': 3000, '🌽': 4200, '🍓': 5500 };\n  SEEDS = ['🥕', '🌽', '🍓'];\n  CROP_PTS = { '🥕': 10, '🌽': 15, '🍓': 20 };\n  INTER_TIME = { harvest: 90000, zoo: 60000, train: 90000, plane: 60000 };\n  ZOO_ANIMALS = ['🐰', '🐶', '🐮', '🐥', '🐷', '🐑'];\n  ZOO_FOODS = ['🥕', '🦴', '🍎', '🌽', '🍓'];\n  PLANE_GOODS = ['🧀', '🍞', '🧁', '🍎', '🎁', '🥚'];\n  PROD_TIME = { '🧀': 2400, '🍞': 2000, '🧁': 2800 };\n\n  // ===== Torcida: personagens que comentam durante o match-3 =====\n\n  worrySaid = false;\n  chatAt = 0;\n  lastChatText = null;\n\n  CHARS = {\n    mariana: {\n      name: 'Mariana', av: 'M', avBg: '#E98FAE',\n      lines: {\n        base: ['Ai Paulaaaa 💅', 'Você peida muito fedido 🤭', 'Ai que queridaaa 💖', 'Sou sua irmã, eu posso falar: capricha aí 💅'],\n        praise: ['AI QUE QUERIDAAA! 👏', 'Jogadona, Paulaaa! ✨', 'Essa é MINHA irmã! 💖💅'],\n        tease: ['Ai Paulaaa, presta atenção kkkk', 'Mana… foi feia essa 🤭', 'Você peida fedido E joga errado 🤭'],\n        hype: ['EXPLODIU TUDO, PAULAAA! 🎆', 'SOCORRO, QUE JOGADA! 😱', 'Calma mana, deixa um pouco pros outros! 💅'],\n        worry: ['Paulaaa, as jogadas tão acabando! 😬', 'Foco, mana, FOCO! 👀'],\n      },\n    },\n    nicollas: {\n      name: 'Nicollas', av: 'N', avBg: '#9C7BC2',\n      lines: {\n        base: ['Te amo meu bem, você consegue 💛', 'Eu adoro o seu cheiro de rosas 🌹', 'Ai se você soubesse o quanto eu te amo 🥹', 'Tô aqui só admirando você jogar 💍'],\n        praise: ['Isso, meu bem! Eu sabia! 💛', 'Linda E boa de jogo 😍', 'Ai se você soubesse o orgulho que eu sinto 🥹'],\n        tease: ['Você me irrita profundamente 😤 (brincadeira, te amo)', 'Meu bem… era o outro lado kkkk', 'Vou fingir que não vi essa, amor 😅'],\n        hype: ['MEU BEM, QUE JOGADA! 🤯', 'Seu cheiro de rosas e fogos de artifício 🌹🎆'],\n        worry: ['Respira, meu bem… você consegue 💛', 'Tá acabando, mas eu acredito em você! 💪'],\n      },\n    },\n    timao: {\n      name: 'Timão', av: '🐶', avBg: '#E9C46A',\n      lines: {\n        base: ['Falam que a gente se parece, não sei por quê 🐶', 'Eu adoro ficar deitado do seu lado 🥰', 'Eu odeio ficar sozinho 🥺', 'Au au! (tradução: oi, mamãe)'],\n        praise: ['AU AU AU! (tradução: jogadona!) 🎉', '*abana o rabo de orgulho* 🐶', 'Au! (tradução: essa foi linda)'],\n        tease: ['Au? (tradução: foi sem querer, né?) 🐶', '*esconde o focinho de vergonha alheia* 🙈'],\n        hype: ['AUUUUU! EXPLODIU TUDO! 🐶🎆', '*late descontroladamente de alegria*'],\n        worry: ['*deita do seu lado pra dar sorte* 🐶', 'Au au au! (tradução: corre, mamãe!)'],\n      },\n    },\n    gareth: {\n      name: 'Gareth Graham', av: 'G', avBg: '#7FA8D9',\n      lines: {\n        base: ['Eu nunca serei tão bom quanto o Nicollas… por isso você nem olha pra mim 💔', 'Quem me dera ser 1% do Nicollas pra ter uma chance com você…', 'Que inveja do Nicollas… ele namora a Ana 💔'],\n        praise: ['Linda E joga bem… Nicollas, seu sortudo 😔', 'Que jogada! Eu aplaudiria pra sempre, se você deixasse 💔'],\n        tease: ['Errou… mas pra mim você é perfeita mesmo assim 💔', 'Eu fingiria que não vi, Ana… qualquer coisa por você 😔'],\n        hype: ['UAU! Casa comigo… ah, é. O Nicollas existe 😔'],\n        worry: ['Se você perder, eu tô aqui… brincadeira, o Nicollas tá 😔', 'Fica calma, Ana… queria tanto poder te ajudar 💔'],\n      },\n    },\n    luan: {\n      name: 'Luan Santana', av: '🎤', avBg: '#C75B7A',\n      lines: {\n        base: ['Quem me dera ser 1% do Nicollas… ele tem a Ana 🎤💔', 'Eu escreveria mil músicas pra você, Ana 🎶', 'Que inveja do Nicollas… queria eu estar no lugar dele 💔'],\n        praise: ['Essa jogada merece uma música: “Ana, rainha do match-3” 🎤🎶', 'BRAVO! O Nicollas não te merece… tá, merece 😔🎤'],\n        tease: ['Errou… e eu ainda pagaria ingresso pra te ver jogar 🎤', 'Essa nota desafinou, hein 🎶😅'],\n        hype: ['MEU DEUS DO CÉU! 🎤🎆 Esse show podia ser meu e seu, Ana!'],\n        worry: ['Tô roendo as unhas… e o Nicollas deve estar tranquilo. Odeio ele 🎤'],\n      },\n    },\n  };\n\n  LEVEL_CHARS = [['mariana'], ['nicollas'], ['gareth', 'luan'], ['timao'], ['mariana', 'nicollas', 'timao', 'gareth', 'luan']];\n\n  pickChat(levelIndex, kind) {\n    const pool = this.LEVEL_CHARS[levelIndex] || this.LEVEL_CHARS[0];\n    const key = pool[Math.floor(Math.random() * pool.length)];\n    const ch = this.CHARS[key];\n    const lines = ch.lines[kind] || ch.lines.base;\n    let text = lines[Math.floor(Math.random() * lines.length)];\n    if (text === this.lastChatText && lines.length > 1) text = lines[(lines.indexOf(text) + 1) % lines.length];\n    this.lastChatText = text;\n    this.chatAt = Date.now();\n    return { key, text };\n  }\n\n  say(kind) {\n    if (this.state.screen !== 'game') return;\n    if (kind !== 'base' && Date.now() - this.chatAt < 2200) return;\n    this.setState({ chat: this.pickChat(this.state.levelIndex, kind) });\n  }\n\n  chatVals() {\n    const c = this.state.chat;\n    const ch = c ? this.CHARS[c.key] : null;\n    return {\n      hasChat: !!ch,\n      chatAv: ch ? ch.av : '',\n      chatAvBg: ch ? ch.avBg : '#9C7BC2',\n      chatName: ch ? ch.name : '',\n      chatText: c ? c.text : '',\n    };\n  }\n\n  shuffleArr(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); const t = a[i]; a[i] = a[j]; a[j] = t; } return a; }\n\n  interIs(t) { return this.state.screen === 'interlude' && this.state.inter && this.state.inter.type === t && !this.state.inter.done; }\n\n  finishInterlude() {\n    const iv = this.state.inter;\n    const newRecord = iv.score > iv.best;\n    const best = Math.max(iv.best, iv.score);\n    try { localStorage.setItem('fzAninha_best_' + iv.type, String(best)); } catch (e) {}\n    this.setInter({ done: true, best, newRecord });\n  }\n\n  INTER_META = {\n    harvest: {\n      emoji: '🚜', name: 'Colheita e Entrega',\n      introTitle: 'Entregas da Fazendinha',\n      introText: 'Pedidos sem fim! Plante, colha e entregue o máximo de pedidos que conseguir em 90 segundos. Cada entrega vale pontos — bata seu recorde! 🌱',\n      doneText: 'Os vizinhos amaram a colheita da Aninha! 💌',\n      footer: 'Toque na terra para plantar · toque de novo para colher 🌱',\n    },\n    zoo: {\n      emoji: '🐮', name: 'Bichinhos Famintos',\n      introTitle: 'Bichinhos Famintos',\n      introText: 'A bicharada da fazendinha está com fome! Escolha o petisco certo e toque no bichinho antes que ele vá embora. São 60 segundos de muita fome! 🍎',\n      doneText: 'Barrigas cheias e corações felizes! 💛',\n      footer: 'Escolha o petisco · toque no bichinho que pediu 🍽️',\n    },\n    train: {\n      emoji: '🚂', name: 'Trem da Festa',\n      introTitle: 'O Trem da Festa',\n      introText: 'Os trens não param de chegar! Escolha o que cada fabriquinha vai produzir e carregue o máximo de vagões em 90 segundos. Trem cheio dá bônus! 🧀🍞🧁',\n      doneText: 'Quantos trens partiram carregadinhos da fazendinha! 🚂🎈',\n      footer: 'Escolha o produto · toque na fabriquinha · toque no vagão para carregar',\n    },\n    plane: {\n      emoji: '✈️', name: 'Avião de Carga',\n      introTitle: 'O Avião de Carga',\n      introText: 'O avião precisa decolar! Toque nas caixas certas da esteira conforme a lista de embarque — caixa errada desconta. Lista completa? Bônus e um novo avião chega! 60 segundos! ✈️',\n      doneText: 'Quantas entregas voaram da fazendinha! ✈️💨',\n      footer: 'Toque só nas caixas que estão na lista de embarque 📋',\n    },\n  };\n\n  setInter(patch) {\n    this.setState((s) => ({ inter: { ...s.inter, ...(typeof patch === 'function' ? patch(s.inter) : patch) } }));\n  }\n\n  startInterlude(type, nextIndex, replay) {\n    let best = 0;\n    try { best = parseInt(localStorage.getItem('fzAninha_best_' + type) || '0', 10) || 0; } catch (e) {}\n    const inter = {\n      type, nextIndex, intro: !replay, done: false, score: 0, best, newRecord: false,\n      endAt: replay ? Date.now() + this.INTER_TIME[type] : null,\n    };\n    if (type === 'harvest') {\n      Object.assign(inter, {\n        seed: '🥕',\n        barn: { '🥕': 0, '🌽': 0, '🍓': 0 },\n        plots: Array.from({ length: 9 }, () => ({ crop: null, at: 0 })),\n        orders: [this.genOrder(), this.genOrder(), this.genOrder()],\n        deliveries: 0,\n      });\n    } else if (type === 'zoo') {\n      Object.assign(inter, { food: '🥕', stalls: Array.from({ length: 4 }, () => this.genAnimal()), fed: 0 });\n    } else if (type === 'train') {\n      Object.assign(inter, {\n        goods: { '🧀': 0, '🍞': 0, '🧁': 0 },\n        slots: [{ good: null, at: null }, { good: null, at: null }, { good: null, at: null }],\n        prod: '🧀',\n        wagons: this.genWagons(),\n        phase: 'idle', trains: 0,\n      });\n    } else {\n      Object.assign(inter, {\n        manifest: this.genManifest(),\n        cells: Array.from({ length: 9 }, () => ({ good: null, until: 0 })),\n        phase: 'idle', planes: 0,\n      });\n    }\n    this.setState({ screen: 'interlude', inter, overlay: null, busy: false, toast: null, hint: null, selectedId: null });\n  }\n\n  genOrder() {\n    const whos = ['🐰', '🐮', '🐥', '🐷', '🐑', '🐴', '🦆', '🐶'];\n    const crops = this.shuffleArr([...this.SEEDS]);\n    const nTypes = 1 + Math.floor(Math.random() * 3);\n    const needs = {};\n    let pts = 0;\n    for (let i = 0; i < nTypes; i++) {\n      const k = crops[i];\n      const v = nTypes === 1 ? 2 + Math.floor(Math.random() * 2) : 1 + Math.floor(Math.random() * 2);\n      needs[k] = v;\n      pts += this.CROP_PTS[k] * v;\n    }\n    return { who: whos[Math.floor(Math.random() * whos.length)], needs, pts };\n  }\n\n  genWagons() {\n    const pool = ['🧀', '🍞', '🧁'];\n    return Array.from({ length: 3 }, () => ({ good: pool[Math.floor(Math.random() * 3)], need: 2 + Math.floor(Math.random() * 2), have: 0 }));\n  }\n\n  genAnimal() {\n    return {\n      animal: this.ZOO_ANIMALS[Math.floor(Math.random() * this.ZOO_ANIMALS.length)],\n      want: this.ZOO_FOODS[Math.floor(Math.random() * this.ZOO_FOODS.length)],\n      born: Date.now(),\n      patience: 5500 + Math.random() * 3500,\n      heart: 0,\n    };\n  }\n\n  genManifest() {\n    const goods = this.shuffleArr([...this.PLANE_GOODS]).slice(0, 3);\n    return goods.map((g) => ({ good: g, need: 3 + Math.floor(Math.random() * 2), have: 0 }));\n  }\n\n  plotTap(i) {\n    const iv = this.state.inter;\n    if (!iv || iv.done) return;\n    const p = iv.plots[i];\n    const now = Date.now();\n    if (!p.crop) {\n      this.setInter({ plots: iv.plots.map((x, k) => (k === i ? { crop: iv.seed, at: now } : x)) });\n    } else if (now - p.at >= this.CROPS[p.crop]) {\n      this.setInter({\n        plots: iv.plots.map((x, k) => (k === i ? { crop: null, at: 0 } : x)),\n        barn: { ...iv.barn, [p.crop]: iv.barn[p.crop] + 1 },\n      });\n    }\n  }\n\n  deliverOrder(oi) {\n    const iv = this.state.inter;\n    if (!iv || iv.done || iv.intro) return;\n    const o = iv.orders[oi];\n    if (!Object.entries(o.needs).every(([k, v]) => iv.barn[k] >= v) rn ok;\n    };\n    for (let r = 0; r < this.ROWS; r++) for (let c = 0; c < this.COLS; c++) {\n      if (c < this.COLS - 1 && trySw(r, c, r, c + 1)) return true;\n      if (r < this.ROWS - 1 && trySw(r, c, r + 1, c)) return true;\n    }\n    return false;\n  }\n\n  startLevel(i) {\n    const L = this.levels[i];\n    this.shape = L.shape;\n    this.ROWS = L.shape.length;\n    this.COLS = L.shape[0].length;\n    this.CELL = this.calcCell();\n    const tiles = this.genBoard(L);\n    this.lastAction = Date.now();\n    this.worrySaid = false;\n    this.setState({ screen: 'game', levelIndex: i, tiles, collected: 0, moves: L.moves, selectedId: null, busy: false, showIntro: true, overlay: null, toast: null, hint: null, shaking: false, chat: this.pickChat(i, 'base') });\n  }\n\n  onDown(t, ev) {\n    this.bump();\n    if (this.state.busy || this.state.showIntro || this.state.overlay) return;\n    this.down = { id: t.id, x: ev.clientX, y: ev.clientY };\n  }\n\n  onUp(ev) {\n    const d = this.down;\n    this.down = null;\n    if (!d || this.state.busy || this.state.showIntro || this.state.overlay) return;\n    const dx = ev.clientX - d.x;\n    const dy = ev.clientY - d.y;\n    if (Math.hypot(dx, dy) < 12) { this.tapTile(d.id); return; }\n    const t = this.tile(d.id);\n    if (!t) return;\n    let dr = 0, dc = 0;\n    if (Math.abs(dx) > Math.abs(dy)) dc = dx > 0 ? 1 : -1; else dr = dy > 0 ? 1 : -1;\n    const n = this.state.tiles.find((x) => !x.rm && x.r === t.r + dr && x.c === t.c + dc);\n    if (n) this.trySwap(t.id, n.id);\n  }\n\n  tapTile(id) {\n    const s = this.state;\n    if (!s.selectedId) { this.setState({ selectedId: id }); return; }\n    if (s.selectedId === id) {\n      const t = this.tile(id);\n      if (t && t.special) { this.activateByTap(t); return; }\n      this.setState({ selectedId: null });\n      return;\n    }\n    const a = this.tile(s.selectedId);\n    const b = this.tile(id);\n    if (a && b && Math.abs(a.r - b.r) + Math.abs(a.c - b.c) === 1) this.trySwap(a.id, b.id);\n    else this.setState({ selectedId: id });\n  }\n\n  swapPositions(aId, bId) {\n    this.setState((s) => {\n      const a = s.tiles.find((t) => t.id === aId);\n      const b = s.tiles.find((t) => t.id === bId);\n      if (!a || !b) return {};\n      return {\n        tiles: s.tiles.map((t) => (t.id === aId ? { ...t, r: b.r, c: b.c } : t.id === bId ? { ...t, r: a.r, c: a.c } : t)),\n      };\n    });\n  }\n\n  async trySwap(aId, bId) {\n    const a = this.tile(aId), b = this.tile(bId);\n    if (!a || !b || Math.abs(a.r - b.r) + Math.abs(a.c - b.c) !== 1) return;\n    this.setState({ busy: true, selectedId: null });\n    this.swapPositions(aId, bId);\n    await this.wait(300);\n    const A = this.tile(aId), B = this.tile(bId);\n    if (A.special || B.special) {\n      this.setState((s) => ({ moves: s.moves - 1 }));\n      await this.activateSwap(A, B);\n      await this.resolve(null);\n      await this.afterMove();\n      return;\n    }\n    if (this.findRuns(this.state.tiles).length) {\n      this.setState((s) => ({ moves: s.moves - 1 }));\n      await this.resolve([aId, bId]);\n      await this.afterMove();\n    } else {\n      this.swapPositions(aId, bId);\n      await this.wait(300);\n      this.say('tease');\n      this.setState({ busy: false });\n    }\n  }\n\n  async activateByTap(t) {\n    this.setState({ busy: true, selectedId: null });\n    this.setState((s) => ({ moves: s.moves - 1 }));\n    this.say('hype');\n    const level = this.levels[this.state.levelIndex];\n    const live = this.state.tiles.filter((x) => !x.rm);\n    const clear = new Set([t.id]);\n    if (t.special === 'rainbow') {\n      live.forEach((x) => { if ((x.special ? x.base : x.type) === level.target) clear.add(x.id); });\n    }\n    this.expandSpecials(clear);\n    await this.applyClear(clear, []);\n    await this.resolve(null);\n    await this.afterMove();\n  }\n\n  async activateSwap(A, B) {\n    const live = this.state.tiles.filter((t) => !t.rm);\n    const clear = new Set();\n    const isRb = (t) => t.special === 'rainbow';\n    if (isRb(A) || isRb(B)) {\n      const rb = isRb(A) ? A : B;\n      const other = rb === A ? B : A;\n      clear.add(rb.id);\n      if (isRb(other)) {\n        live.forEach((t) => clear.add(t.id));\n      } else {\n        const ty = other.special ? other.base : other.type;\n        live.forEach((t) => { if ((t.special ? t.base : t.type) === ty) clear.add(t.id); });\n        if (other.special) clear.add(other.id);\n      }\n    } else {\n      if (A.special) clear.add(A.id);\n      if (B.special) clear.add(B.id);\n    }\n    this.expandSpecials(clear);\n    await this.applyClear(clear, []);\n  }\n\n  expandSpecials(clear) {\n    const live = this.state.tiles.filter((t) => !t.rm);\n    const queue = [...clear];\n    const processed = new Set();\n    while (queue.length) {\n      const id = queue.pop();\n      if (processed.has(id)) continue;\n      processed.add(id);\n      const t = live.find((x) => x.id === id);\n      if (!t || !t.special) continue;\n      let hit = [];\n      if (t.special === 'rocketH') hit = live.filter((x) => x.r === t.r);\n      else if (t.special === 'rocketV') hit = live.filter((x) => x.c === t.c);\n      else if (t.special === 'bomb') hit = live.filter((x) => Math.abs(x.r - t.r) <= 1 && Math.abs(x.c - t.c) <= 1);\n      hit.forEach((x) => { if (!clear.has(x.id)) { clear.add(x.id); queue.push(x.id); } });\n    }\n  }\n\n  classify(runs, swapIds) {\n    const clear = new Set();\n    runs.forEach((run) => run.tiles.forEach((t) => clear.add(t.id)));\n    const creations = [];\n    const usedRun = new Set();\n    const inRuns = new Map();\n    runs.forEach((run, ri) => run.tiles.forEach((t) => {\n      if (!inRuns.has(t.id)) inRuns.set(t.id, []);\n      inRuns.get(t.id).push(ri);\n    }));\n    // L / T intersections -> bomb\n    for (const [id, rs] of inRuns) {\n      if (rs.length >= 2 && !rs.some((ri) => usedRun.has(ri))) {\n        rs.forEach((ri) => usedRun.add(ri));\n        const t = runs[rs[0]].tiles.find((x) => x.id === id);\n        creations.push({ id, special: 'bomb', base: t.type });\n      }\n    }\n    const pickAt = (run) => {\n      if (swapIds) {\n        const hit = run.tiles.find((t) => swapIds.includes(t.id));\n        if (hit) return hit;\n      }\n      return run.tiles[Math.floor(run.tiles.length / 2)];\n    };\n    runs.forEach((run, ri) => {\n      if (usedRun.has(ri)) return;\n      if (run.tiles.length >= 5) {\n        const t = pickAt(run);\n        creations.push({ id: t.id, special: 'rainbow', base: t.type });\n      } else if (run.tiles.length === 4) {\n        const t = pickAt(run);\n        creations.push({ id: t.id, special: run.dir === 'h' ? 'rocketH' : 'rocketV', base: t.type });\n      }\n    });\n    creations.forEach((c) => clear.delete(c.id));\n    return { clear, creations };\n  }\n\n  async applyClear(clear, creations) {\n    if (!clear.size && !creations.length) return;\n    const level = this.levels[this.state.levelIndex];\n    const boom = [...clear].some((id) => { const t = this.tile(id); return t && t.special; });\n    const bigBoom = [...clear].some((id) => { const t = this.tile(id); return t && (t.special === 'bomb' || t.special === 'rainbow'); });\n    if (creations.length) this.say('praise');\n    else if (bigBoom) this.say('hype');\n    // flash phase: highlight what is about to pop\n    this.setState((s) => ({\n      shaking: s.shaking || bigBoom,\n      tiles: s.tiles.map((t) => (clear.has(t.id) && !creations.some((c) => c.id === t.id) ? { ...t, fl: true } : t)),\n    }));\n    await this.wait(boom ? 400 : 160);\n    let gained = 0;\n    this.state.tiles.forEach((t) => {\n      if (clear.has(t.id) && !creations.some((c) => c.id === t.id) && (t.special ? t.base : t.type) === level.target) gained++;\n    });\n    this.setState((s) => ({\n      tiles: s.tiles.map((t) => {\n        const c = creations.find((x) => x.id === t.id);\n        if (c) return { ...t, special: c.special, base: c.base, rm: false, fl: false };\n        return clear.has(t.id) ? { ...t, rm: true, fl: false } : t;\n      }),\n      collected: Math.min(25, s.collected + gained),\n    }));\n    await this.wait(boom ? 440 : 330);\n    if (this.state.shaking) this.setState({ shaking: false });\n    // gravity within each column's valid cells\n    const survivors = this.state.tiles.filter((t) => !t.rm).map((t) => ({ ...t }));\n    const spawns = [];\n    const finals = new Map();\n    for (let c = 0; c < this.COLS; c++) {\n      const validRows = [];\n      for (let r = 0; r < this.ROWS; r++) if (this.valid(r, c)) validRows.push(r);\n      const col = survivors.filter((t) => t.c === c).sort((x, y) => x.r - y.r);\n      const missing = validRows.length - col.length;\n      col.forEach((t, i) => finals.set(t.id, validRows[missing + i]));\n      for (let i = 0; i < missing; i++) {\n        const id = this.nextId++;\n        spawns.push({ id, type: this.randType(level), r: validRows[0] - missing + i, c, rm: false, special: null, base: null });\n        finals.set(id, validRows[i]);\n      }\n    }\n    this.setState({ tiles: [...survivors, ...spawns] });\n    await this.wait(40);\n    this.setState((s) => ({ tiles: s.tiles.map((t) => ({ ...t, r: finals.get(t.id) })) }));\n    await this.wait(boom ? 420 : 330);\n  }\n\n  async resolve(swapIds) {\n    while (true) {\n      const runs = this.findRuns(this.state.tiles);\n      if (!runs.length) break;\n      const { clear, creations } = this.classify(runs, swapIds);\n      swapIds = null;\n      this.expandSpecials(clear);\n      await this.applyClear(clear, creations);\n    }\n  }\n\n  async afterMove() {\n    if (this.state.collected >= 25) {\n      if (this.state.levelIndex === this.levels.length - 1) this.setState({ screen: 'final', busy: true, overlay: null });\n      else this.setState({ overlay: 'win', busy: true });\n      return;\n    }\n    if (this.state.moves <= 0) { this.setState({ overlay: 'lose', busy: true }); return; }\n    if (!this.movePossible(this.state.tiles)) await this.reshuffle();\n    if (this.state.moves > 0 && this.state.moves <= 5 && !this.worrySaid) { this.worrySaid = true; this.say('worry'); }\n    this.bump();\n    this.setState({ busy: false });\n  }\n\n  async reshuffle() {\n    this.setState({ toast: 'O vento embaralhou a fazenda! 🌪️' });\n    await this.wait(500);\n    const level = this.levels[this.state.levelIndex];\n    let tiles = null;\n    for (let tries = 0; tries < 60; tries++) {\n      const idxs = this.state.tiles.map((t, i) => i).filter((i) => !this.state.tiles[i].special);\n      const types = idxs.map((i) => this.state.tiles[i].type);\n      for (let i = types.length - 1; i > 0; i--) {\n        const j = Math.floor(Math.random() * (i + 1));\n        const tmp = types[i]; types[i] = types[j]; types[j] = tmp;\n      }\n      const cand = this.state.tiles.map((t) => ({ ...t }));\n      idxs.forEach((ti, k) => { cand[ti].type = types[k]; });\n      if (this.findRuns(cand).length === 0 && this.movePossible(cand)) { tiles = cand; break; }\n    }\n    if (!tiles) tiles = this.genBoard(level);\n    this.setState({ tiles });\n    await this.wait(1100);\n    this.setState({ toast: null });\n  }\n\n  pastelFor(t, level) {\n    if (t.special) return 'linear-gradient(135deg,#FFFBEA,#FFE6A8)';\n    const i = level.set.indexOf(t.type);\n    return this.PALETTE[i >= 0 ? i % this.PALETTE.length : 0];\n  }\n\n  renderBoard() {\n    const e = React.createElement;\n    const CELL = this.CELL, PAD = 8, TS = CELL - 4;\n    const level = this.levels[this.state.levelIndex];\n    const sel = this.state.selectedId;\n    const w = this.COLS * CELL - 4 + PAD * 2;\n    const h = this.ROWS * CELL - 4 + PAD * 2;\n    const cells = [];\n    for (let r = 0; r < this.ROWS; r++) for (let c = 0; c < this.COLS; c++) {\n      if (!this.valid(r, c)) continue;\n      cells.push(e('div', {\n        key: 'c' + r + '-' + c,\n        style: {\n          position: 'absolute', left: c * CELL + PAD, top: r * CELL + PAD, width: TS, height: TS,\n          borderRadius: 12, background: (r + c) % 2 ? '#F0DAE1' : '#E8CDD6',\n          boxShadow: 'inset 0 1px 0 rgba(255,255,255,.5)',\n        },\n      }));\n    }\n    const hintIds = this.state.hint ? this.state.hint.ids : [];\n    const tiles = this.state.tiles.map((t) => {\n      const isSel = t.id === sel;\n      const isHint = hintIds.includes(t.id);\n      const ringed = isSel || isHint;\n      return e('div', {\n        key: t.id,\n        onPointerDown: (ev) => this.onDown(t, ev),\n        style: {\n          position: 'absolute', width: TS, height: TS, left: 0, top: 0,\n          transform: 'translate(' + (t.c * CELL + PAD) + 'px,' + (t.r * CELL + PAD) + 'px) ' + (t.rm ? 'scale(.05) rotate(150deg)' : t.fl ? 'scale(1.22)' : isSel ? 'scale(1.12)' : 'scale(1)'),\n          opacity: t.rm ? 0 : 1,\n          transition: 'transform .32s cubic-bezier(.3,1.4,.55,1), opacity .28s ease, box-shadow .2s ease, filter .2s ease',\n          filter: t.fl ? 'brightness(1.35) saturate(1.2)' : undefined,\n          display: 'flex', alignItems: 'center', justifyContent: 'center',\n          fontSize: Math.max(17, Math.round(CELL * 0.52)), cursor: 'pointer', userSelect: 'none',\n          background: this.pastelFor(t, level),\n          borderRadius: 13,\n          boxShadow: t.fl\n            ? '0 0 0 3px #FFFFFF, 0 0 22px rgba(255,255,255,.85)'\n            : isSel ? '0 0 0 3px #C75B7A, 0 6px 14px rgba(140,60,80,.4)'\n            : isHint ? '0 0 0 3px #9C7BC2, 0 0 18px rgba(156,123,194,.75)'\n            : t.special ? undefined : '0 2px 5px rgba(90,40,55,.25)',\n          animation: t.special && !ringed && !t.fl ? 'glowPulse 1.4s ease-in-out infinite' : undefined,\n          zIndex: t.fl || ringed ? 2 : 1,\n        },\n      }, e('span', {\n        style: {\n          display: 'inline-block', lineHeight: 1,\n          animation: isHint ? 'hintWiggle .75s ease-in-out infinite' : t.special ? 'specialBorn .55s cubic-bezier(.34,1.56,.64,1)' : undefined,\n        },\n      }, t.special ? this.SPECIAL_ICON[t.special] : t.type));\n    });\n    return e('div', {\n      onPointerUp: (ev) => this.onUp(ev),\n      onPointerCancel: () => { this.down = null; },\n      style: {\n        position: 'relative', width: w, height: h,\n        touchAction: 'none',\n        animation: this.state.shaking ? 'shake .5s ease' : undefined,\n      },\n    }, [...cells, ...tiles]);\n  }\n\n  titleArtEl() {\n    if (!this._titleArt) {\n      const e = React.createElement;\n      const ems = ['🐥', '🍫', '🐶', '🌻', '🎂'];\n      this._titleArt = e('div', { style: { display: 'flex', gap: 10, justifyContent: 'center' } },\n        ems.map((em, i) => e('div', { key: i, style: { fontSize: 40, animation: 'floaty 2.6s ease-in-out ' + (i * 0.25) + 's infinite' } }, em)));\n    }\n    return this._titleArt;\n  }\n\n  confettiEl() {\n    if (!this._confetti) {\n      const e = React.createElement;\n      const colors = ['#E98FAE', '#9C7BC2', '#C75B7A', '#F6C6D7', '#B98BD9', '#E9C46A'];\n      const pieces = [];\n      for (let i = 0; i < 55; i++) {\n        pieces.push(e('div', {\n          key: i,\n          style: {\n            position: 'absolute', top: -24, left: (Math.random() * 100) + '%',\n            width: 8 + Math.random() * 6, height: 12 + Math.random() * 8,\n            background: colors[i % colors.length], borderRadius: 3, opacity: 0.9,\n            animation: 'confettiFall ' + (3 + Math.random() * 3).toFixed(2) + 's linear ' + (Math.random() * 4).toFixed(2) + 's infinite',\n          },\n        }));\n      }\n      this._confetti = e('div', { style: { position: 'absolute', inset: 0, overflow: 'hidden', pointerEvents: 'none', zIndex: 4 } }, pieces);\n    }\n    return this._confetti;\n  }\n\n  renderVals() {\n    const s = this.state;\n    const L = this.levels[s.levelIndex];\n    const boardW = this.shape ? this.COLS * this.CELL - 4 + 16 : 428;\n    return {\n      ...this.interVals(),\n      ...this.chatVals(),\n      isTitle: s.screen === 'title',\n      isGame: s.screen === 'game',\n      isFinal: s.screen === 'final',\n      showIntro: s.showIntro && s.screen === 'game',\n      showWin: s.overlay === 'win',\n      showLose: s.overlay === 'lose',\n      hasToast: !!s.toast,\n      toast: s.toast,\n      levelNum: s.levelIndex + 1,\n      target: L.target,\n      introTitle: L.title,\n      introText: L.text,\n      winText: L.win,\n      levelMoves: L.moves,\n      collected: s.collected,\n      movesLeft: s.moves,\n      progressPct: Math.round((s.collected / 25) * 100),\n      boardW,\n      board: this.renderBoard(),\n      confetti: this.confettiEl(),\n      titleArt: this.titleArtEl(),\n      startGame: () => this.startLevel(0),\n      closeIntro: () => { this.lastAction = Date.now(); this.setState({ showIntro: false }); },\n      nextLevel: () => {\n        const i = this.state.levelIndex;\n        if (i === 0) this.startInterlude('harvest', 1);\n        else if (i === 1) this.startInterlude('zoo', 2);\n        else if (i === 2) this.startInterlude('train', 3);\n        else if (i === 3) this.startInterlude('plane', 4);\n        else this.startLevel(i + 1);\n      },\n      retryLevel: () => this.startLevel(this.state.levelIndex),\n      playAgain: () => this.setState({ screen: 'title', overlay: null, busy: false }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
